server {
    listen 80;
    server_name drive.shubnit.com;
    return 301 https://drive.shubnit.com$request_uri;
}

server {
    listen 443 ssl;
    server_name drive.shubnit.com;

    ssl_certificate /etc/letsencrypt/live/shubnit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shubnit.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 500m;

    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    root /home/ubuntu/driveSelfHosting/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
